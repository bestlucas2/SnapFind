{% extends "base.html" %}
{% block body %}
<div x-data="{ sidebar: false, upload: false }"
     @paste-image.window="upload = true" @snap-open-upload.window="upload = true"
     class="h-screen flex overflow-hidden">

  <!-- Mobile overlay -->
  <div x-show="sidebar" x-transition.opacity @click="sidebar = false"
       class="fixed inset-0 z-30 bg-black/40 lg:hidden" style="display:none"></div>

  {% include "partials/_sidebar.html" %}

  <div class="flex-1 flex flex-col min-w-0 h-screen">
    {% include "partials/_nav.html" %}
    <main class="flex-1 overflow-y-auto overscroll-contain px-4 sm:px-6 lg:px-8 py-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% include "partials/_upload_modal.html" %}
</div>
{% endblock %}
