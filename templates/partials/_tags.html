<div id="tags-{{ shot.id }}" class="flex flex-wrap gap-1.5 items-center">
  {% for t in shot.tags %}
  <span class="inline-flex items-center gap-1 pl-2 pr-1 py-0.5 rounded-md text-xs bg-neutral-100 dark:bg-neutral-800 text-neutral-700 dark:text-neutral-300">
    #{{ t.name }}
    <button hx-post="/screenshot/{{ shot.id }}/tags/{{ t.id }}/remove" hx-target="#tags-{{ shot.id }}" hx-swap="outerHTML"
            class="text-neutral-400 hover:text-red-500" title="Remove tag">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </span>
  {% endfor %}
  {% if shot.tags|length < max_tags %}
  <form hx-post="/screenshot/{{ shot.id }}/tags/add" hx-target="#tags-{{ shot.id }}" hx-swap="outerHTML" class="inline-flex">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input name="tag" placeholder="+ add tag" autocomplete="off"
           class="w-24 px-2 py-0.5 rounded-md text-xs bg-transparent border border-dashed border-neutral-300 dark:border-neutral-600 focus:border-brand-400 outline-none">
  </form>
  {% else %}
  <span class="text-xs text-neutral-400">Max {{ max_tags }} tags</span>
  {% endif %}
</div>
