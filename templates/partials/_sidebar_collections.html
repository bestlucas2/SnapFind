<div id="sidebar-collections" x-data="{ adding: false }">
  <div class="flex items-center justify-between px-3 mb-1">
    <h3 class="text-xs font-semibold uppercase tracking-wider text-neutral-400">Collections</h3>
    <button @click="adding = !adding" title="New collection" class="p-1 rounded-md text-neutral-400 hover:text-brand-600 hover:bg-neutral-100 dark:hover:bg-neutral-800">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <form x-show="adding" x-transition style="display:none"
        hx-post="/collections" hx-target="#sidebar-collections" hx-swap="outerHTML"
        @submit="adding = false" class="px-3 mb-2">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input name="name" placeholder="Collection name" required x-init="$nextTick(() => {})"
           class="w-full px-2.5 py-1.5 rounded-lg text-sm bg-neutral-100 dark:bg-neutral-800 border border-transparent focus:border-brand-400 outline-none">
  </form>

  <div class="space-y-0.5">
    {% for c in sidebar_collections %}
    <div class="group flex items-center rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 drop-collection transition-colors"
         data-collection-id="{{ c.obj.id }}">
      <a href="/app?collection_id={{ c.obj.id }}" class="flex-1 flex items-center gap-3 px-3 py-2 text-sm min-w-0 text-neutral-700 dark:text-neutral-300">
        <svg class="w-4 h-4 shrink-0 text-brand-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span class="truncate flex-1">{{ c.obj.name }}</span>
        <span class="text-xs text-neutral-400">{{ c.count }}</span>
      </a>
      <button hx-delete="/collections/{{ c.obj.id }}" hx-target="#sidebar-collections" hx-swap="outerHTML"
              hx-confirm="Delete '{{ c.obj.name }}'? Screenshots are kept and moved out of the collection."
              class="opacity-0 group-hover:opacity-100 px-2 text-neutral-400 hover:text-red-500 transition" title="Delete">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    {% endfor %}
    {% if not sidebar_collections %}
    <p class="px-3 py-1.5 text-xs text-neutral-400">No collections yet.</p>
    {% endif %}
  </div>
</div>
