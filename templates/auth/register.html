{% extends "base.html" %}
{% block title %}Create account · {{ app_name }}{% endblock %}
{% block body %}
<div class="min-h-full flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <a href="/" class="flex items-center justify-center gap-2 mb-8">
      <span class="inline-flex items-center justify-center w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 text-white shadow-sm">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9V5a2 2 0 012-2h4M21 9V5a2 2 0 00-2-2h-4M3 15v4a2 2 0 002 2h4M21 15v4a2 2 0 01-2 2h-4"/><circle cx="12" cy="12" r="3"/></svg>
      </span>
    </a>
    <div class="rounded-2xl border border-neutral-200/70 dark:border-neutral-800 bg-white dark:bg-neutral-900 shadow-card p-6">
      <h1 class="text-xl font-bold text-center">Create your account</h1>
      <p class="text-sm text-neutral-500 text-center mt-1">Start indexing your screenshots in seconds.</p>

      {% if error %}
      <div class="mt-4 px-3 py-2 rounded-lg bg-red-50 dark:bg-red-950/40 text-red-600 dark:text-red-400 text-sm">{{ error }}</div>
      {% endif %}

      <form method="post" action="/register" class="mt-5 space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
          <label class="block text-sm font-medium mb-1">Name</label>
          <input name="display_name" type="text" value="{{ display_name|default('') }}"
                 class="w-full px-3 py-2.5 rounded-lg text-sm bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 focus:border-brand-400 focus:ring-2 focus:ring-brand-500/20 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input name="email" type="email" required value="{{ email|default('') }}"
                 class="w-full px-3 py-2.5 rounded-lg text-sm bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 focus:border-brand-400 focus:ring-2 focus:ring-brand-500/20 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input name="password" type="password" required minlength="6"
                 class="w-full px-3 py-2.5 rounded-lg text-sm bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 focus:border-brand-400 focus:ring-2 focus:ring-brand-500/20 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Confirm password</label>
          <input name="confirm" type="password" required minlength="6"
                 class="w-full px-3 py-2.5 rounded-lg text-sm bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 focus:border-brand-400 focus:ring-2 focus:ring-brand-500/20 outline-none">
        </div>
        <button class="w-full py-2.5 rounded-lg text-sm font-semibold bg-brand-600 hover:bg-brand-700 text-white">Create account</button>
      </form>
    </div>
    <p class="text-center text-sm text-neutral-500 mt-5">
      Already have an account? <a href="/login" class="text-brand-600 font-medium hover:underline">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
