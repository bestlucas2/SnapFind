services:
  db:
    image: postgres:16-alpine
    container_name: snapfind-db
    environment:
      POSTGRES_USER: snapfind
      POSTGRES_PASSWORD: snapfind
      POSTGRES_DB: snapfind
    ports:
      - "5432:5432"
    volumes:
      - snapfind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapfind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  snapfind_pgdata:
